{% extends "base.html" %}

{% block content %}

<div class="p-6">

<h1 class="text-2xl font-bold mb-6">Edit Service</h1>

<div class="bg-gray-800 p-6 rounded">

<form method="post" action="/inventory/services/update/{{ services.id }}">

<div class="mb-4">
<label class="block mb-1">Service Name</label>

<input
name="service_name"
value="{{ services.name }}"
class="p-2 rounded text-black w-full"
required
>
</div>

<div class="mb-4">


<label class="block mb-1">Description</label>   
<input
name="description"
value="{{ services.description }}"
class="p-2 rounded text-black"
required
>

<label class="block mb-1">Monitor method</label>   
<input
name="monitor_method"
value="{{ services.monitor_method }}"
class="p-2 rounded text-black"
required
>

<label class="block mb-1">Interval</label>
<input
name="check_interval"
value="{{ services.check_interval }}"
class="p-2 rounded text-black"
>

<label class="block mb-1">Timeout</label>
<input
name="timeout_seconds"
value="{{ services.timeout_seconds }}"
class="p-2 rounded text-black"
>

<label class="block mb-1">Retry count</label>
<input
name="retry_count"
value="{{ services.retry_count }}"
class="p-2 rounded text-black"
>

</div>


<div class="flex gap-3">

<button
type="submit"
class="bg-blue-500 px-4 py-2 rounded hover:bg-blue-600"
>
Save
</button>

<a
href="/inventory/services/"
class="bg-gray-600 px-4 py-2 rounded hover:bg-gray-700"
>
Cancel
</a>

</div>

</form>

</div>

</div>

{% endblock %}
